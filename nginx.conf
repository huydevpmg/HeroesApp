server {
  listen 80;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  location /api/auth/ {
    proxy_pass http://auth-service:4000;
  }

  location /api/profile/ {
    proxy_pass http://auth-service:4000;
  }

  location /api/heroes/ {
    proxy_pass http://hero-service:5000;
  }

  location /api/tags/ {
    proxy_pass http://hero-service:5000;
  }
}
